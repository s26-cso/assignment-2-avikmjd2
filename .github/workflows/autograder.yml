name: Autograding
on: [push]
jobs:
  Autograding:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y gcc-riscv64-linux-gnu python3-pip qemu-user
          pip3 install numpy

      - name: Run tests
        env:
          GH_TOKEN: ${{ secrets.TEST_PAT }}
        id: test_runner
        run: |
          gh release download --repo s26-cso/a2-grader --pattern '*'
          unzip autograder.zip
          unzip binary-provider.zip
          USERNAME="${{ github.actor }}"
          chmod +x autograder/autograder.sh
          autograder/autograder.sh "${USERNAME}"
